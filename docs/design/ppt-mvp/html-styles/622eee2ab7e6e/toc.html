<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<title>Template-style toc — 622eee2ab7e6e</title>
<style>
  :root {
    --color-ink: #1F2937;
    --color-ink-soft: #4B5563;
    --color-ink-dim: #9CA3AF;
    --color-primary: #1E40AF;
    --color-primary-soft: #3B82F6;
    --color-accent: #22C55E;
    --color-accent-soft: #86EFAC;
    --color-surface: #FFFFFF;
    --color-card: #F8FAFC;
    --color-card-border: #E2E8F0;
    --font-title: "思源宋体 CN", "PingFang SC", "Source Han Serif CN", serif;
    --font-body: "PingFang SC", "Microsoft YaHei", sans-serif;
    --font-mono: "SF Mono", "Menlo", "Consolas", monospace;
  }
  html, body { margin: 0; padding: 0; background: #EEE; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .slide-root {
    position: relative;
    width: 1280px;
    height: 720px;
    background: var(--color-surface);
    overflow: hidden;
    font-family: var(--font-body);
    color: var(--color-ink);
    display: grid;
    grid-template-columns: 460px 1fr 64px;
  }

  /* LEFT — hero feature item */
  .hero-col {
    position: relative;
    background: linear-gradient(135deg, #1E3A8A 0%, #1E40AF 45%, #2563EB 100%);
    color: #FFF;
    padding: 80px 48px 60px 60px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  /* hero geometry: angled light strip + tiny green pill */
  .hero-col::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg, transparent 55%, rgba(255,255,255,0.06) 55%, rgba(255,255,255,0.06) 62%, transparent 62%);
    pointer-events: none;
  }
  .hero-col::after {
    content: "";
    position: absolute;
    bottom: 48px; right: -30px;
    width: 160px; height: 160px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(34,197,94,0.22) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-header { display: flex; flex-direction: column; gap: 8px; }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 11pt; letter-spacing: 6px; text-transform: uppercase;
    color: var(--color-accent-soft);
    font-weight: 600;
  }
  .page-title {
    font-family: var(--font-title);
    font-size: 44pt; font-weight: 700;
    letter-spacing: 6px; line-height: 1.0;
  }
  .page-title-count {
    font-family: var(--font-mono);
    font-size: 11pt; letter-spacing: 2px;
    color: rgba(255,255,255,0.6);
    margin-top: 18px;
  }

  .hero-feature {
    display: flex; flex-direction: column; gap: 14px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.18);
  }
  .hero-feature-label {
    font-family: var(--font-mono);
    font-size: 9pt; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    font-weight: 500;
  }
  .hero-index {
    font-family: var(--font-title);
    font-size: 108pt; font-weight: 800;
    line-height: 0.85;
    color: var(--color-accent);
    letter-spacing: -4px;
  }
  .hero-title {
    font-family: var(--font-title);
    font-size: 28pt; font-weight: 700;
    line-height: 1.25;
  }
  .hero-subtitle {
    font-family: var(--font-body);
    font-size: 13pt; line-height: 1.55;
    color: rgba(255,255,255,0.78);
    margin-top: -4px;
  }

  /* MIDDLE — dense index list */
  .list-col {
    padding: 44px 40px 36px 48px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 6px;
  }
  .list-header {
    display: flex; align-items: baseline; gap: 14px;
    margin-bottom: 6px;
  }
  .list-header-accent {
    width: 48px; height: 3px; background: var(--color-accent);
    align-self: center;
    margin-right: 6px;
  }
  .list-header-label {
    font-family: var(--font-mono);
    font-size: 10pt; letter-spacing: 3px; text-transform: uppercase;
    color: var(--color-ink-dim); font-weight: 600;
  }
  .list-header-count {
    font-family: var(--font-mono);
    font-size: 10pt; color: var(--color-primary);
    font-weight: 600; letter-spacing: 2px;
    margin-left: auto;
  }

  .index-item {
    display: grid;
    grid-template-columns: 52px 1fr auto;
    align-items: center;
    gap: 18px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid transparent;
    transition: all 0.12s ease;
  }
  .index-item:hover { background: var(--color-card); border-color: var(--color-card-border); }

  .index-num {
    font-family: var(--font-mono);
    font-size: 18pt; font-weight: 700;
    color: var(--color-primary);
    letter-spacing: 1px;
    line-height: 1.0;
  }
  .index-body {
    display: flex; flex-direction: column; gap: 2px;
    min-width: 0;
  }
  .index-title {
    font-family: var(--font-body);
    font-size: 14pt; font-weight: 600;
    color: var(--color-ink);
    line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .index-subtitle {
    font-family: var(--font-body);
    font-size: 10pt; line-height: 1.4;
    color: var(--color-ink-soft);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .index-dot {
    width: 8px; height: 8px; border-radius: 999px;
    background: var(--color-card-border);
  }
  .index-item--alt .index-dot { background: var(--color-accent); }

  /* RIGHT — vertical CONTENTS ribbon */
  .ribbon {
    position: relative;
    background: #F1F5F9;
    display: flex; align-items: center; justify-content: center;
  }
  .ribbon-text {
    font-family: var(--font-mono);
    font-size: 11pt;
    letter-spacing: 12px; text-transform: uppercase;
    color: var(--color-ink-dim);
    writing-mode: vertical-rl;
    font-weight: 600;
  }
  .ribbon::before {
    content: "";
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px; height: 48px;
    background: var(--color-accent);
  }
  .ribbon::after {
    content: "";
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 2px; height: 48px;
    background: var(--color-primary);
  }
</style>
</head>
<body>

    <div class="index-item">

  <!-- RIGHT: vertical ribbon -->

</div>
