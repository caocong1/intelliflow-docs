name: PPT Agent SVG Gate

on:
  pull_request:
    paths:
      - "packages/backend/src/modules/ppt-agent/**"
      - "packages/backend/package.json"
      - "package.json"
      - "docs/design/ai-ppt.md"
      - "docs/design/ppt-agent-regression-log.md"
  push:
    branches:
      - main
    paths:
      - "packages/backend/src/modules/ppt-agent/**"
      - "packages/backend/package.json"
      - "package.json"
      - "docs/design/ai-ppt.md"
      - "docs/design/ppt-agent-regression-log.md"

jobs:
  svg-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run PPT agent SVG gate
        run: bun run test:ppt-agent:svg:gate
